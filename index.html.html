<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal AI</title>
    <!-- 🖼️ Custom Tab Logo Link (Make sure your logo image is named logo.png inside your GitHub repo) -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 📁 Left Sidebar Navigation (ChatGPT/Gemini Style) */
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            justify-content: space-between;
            border-right: 1px solid #2d2f31;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hides on mobile screens for a better layout */
        }

        .new-chat-btn {
            background-color: #1a1a1c;
            border: 1px solid #3c4043;
            color: #ffffff;
            border-radius: 50px;
            padding: 12px 24px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .new-chat-btn:hover {
            background-color: #2b2c2e;
        }

        .sidebar-footer {
            font-size: 0.85rem;
            color: #9aa0a6;
            padding-left: 10px;
        }

        /* 💬 Main Workspace Area */
        .main-chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background-color: #131314;
        }

        /* Chat Log Display Area */
        .chat-stream {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .messages-wrapper {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 🚀 Welcome Screen (Like Gemini/ChatGPT) */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 15vh;
            text-align: center;
        }

        .welcome-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            border-radius: 50%;
        }

        .welcome-screen h1 {
            font-size: 2.5rem;
            font-weight: 500;
            background: linear-gradient(70deg, #4285f4, #9b51e0, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Message Box Components */
        .message-row {
            display: flex;
            gap: 20px;
            width: 100%;
            align-items: flex-start;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #3e3e42;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .avatar.bot-avatar {
            background-color: #9b51e0;
        }

        .bubble {
            max-width: calc(100% - 60px);
            line-height: 1.6;
            font-size: 1rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            padding-top: 4px;
        }

        .user-row .bubble {
            background-color: #2b2a2a;
            padding: 12px 20px;
            border-radius: 24px;
        }

        /* 💊 Center Capsule Input Bar */
        .input-form-area {
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #131314;
        }

        .input-capsule {
            width: 100%;
            max-width: 720px;
            background-color: #1e1f20;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 6px 14px 6px 24px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-capsule:focus-within {
            border-color: #3c4043;
            background-color: #232425;
        }

        .input-capsule input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1rem;
            height: 44px;
        }

        .input-capsule button {
            background-color: #303134;
            color: #ffffff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .input-capsule button:hover {
            background-color: #3c4043;
        }

        .input-capsule button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- Left Sidebar Menu -->
    <div class="sidebar">
        <button class="new-chat-btn" onclick="window.location.reload()">
            <span>＋</span> New Chat
        </button>
        <div class="sidebar-footer">
            <p>Eternal AI Core v1.0</p>
        </div>
    </div>

    <!-- Main Chat Workspace -->
    <div class="main-chat-container">
        
        <div class="chat-stream" id="chat-stream">
            <div class="messages-wrapper" id="messages-wrapper">
                
                <!-- Dynamic Welcome Message Heading -->
                <div class="welcome-screen" id="welcome-screen">
                    <img src="logo.png" class="welcome-logo" alt="" onerror="this.style.display='none'">
                    <h1>Loading system...</h1>
                </div>

            </div>
        </div>

        <!-- Center Capsule Input Field -->
        <div class="input-form-area">
            <div class="input-capsule">
                <input type="text" id="user-input" placeholder="Ask Eternal AI..." autocomplete="off">
                <button id="send-btn" onclick="sendMessage()">➔</button>
            </div>
        </div>

    </div>

    <script>
        // 🌐 IMPORTANT: Change this address to match your XenonHost connection network link!
        const BACKEND_URL = 'http://YOUR_XENONHOST_IP_OR_DOMAIN:8080/chat'; 

        const stream = document.getElementById('chat-stream');
        const wrapper = document.getElementById('messages-wrapper');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeScreen = document.getElementById('welcome-screen');

        // ✨ Automatically ask for and remember the user's name
        function handleUserGreeting() {
            let savedName = localStorage.getItem('eternal_user_name');
            const welcomeHeading = welcomeScreen.querySelector('h1');

            if (!savedName) {
                savedName = prompt("Welcome to Eternal AI! What is your name?");
                
                if (!savedName || savedName.trim() === "") {
                    savedName = "Friend";
                } else {
                    savedName = savedName.trim();
                }
                localStorage.setItem('eternal_user_name', savedName);
            }

            welcomeHeading.textContent = `Hi ${savedName}, what's the move?`;
        }

        // Run name checker as soon as the page loads up
        handleUserGreeting();

        // Listen for "Enter" key presses to send text fast
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Hide the center welcome header layout on the first question input
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            // Put user's bubble text on screen
            appendMessage(text, 'user');
            userInput.value = '';
            
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Create loading prompt indicator
            const loadingBubble = appendMessage('Thinking...', 'bot');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                if (data.reply) {
                    loadingBubble.textContent = data.reply;
                } else {
                    loadingBubble.textContent = "Error: Unrecognized API layout reply data structure.";
                }
            } catch (error) {
                console.error(error);
                loadingBubble.textContent = "Unable to process connection request. Verify backend port configs are operational.";
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(text, sender) {
            const row = document.createElement('div');
            row.classList.add('message-row', sender === 'user' ? 'user-row' : 'bot-row');

            if (sender === 'bot') {
                const avatar = document.createElement('div');
                avatar.classList.add('avatar', 'bot-avatar');
                avatar.textContent = 'AI';
                row.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;
            row.appendChild(bubble);

            if (sender === 'user') {
                const avatar = document.createElement('div');
                avatar.classList.add('avatar');
                avatar.textContent = 'U';
                row.appendChild(avatar);
            }

            wrapper.appendChild(row);
            stream.scrollTop = stream.scrollHeight; // Keep view auto-scrolled down
            return bubble;
        }
    </script>
</body>
</html>
