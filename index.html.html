<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal AI - Chat Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1c;
            color: #f0f0f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: #232326;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #323236;
        }

        /* Header Bar */
        .chat-header {
            background-color: #2d2d31;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #323236;
        }

        .chat-header .status-dot {
            width: 10px;
            height: 10px;
            background-color: #43b581;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px #43b581;
        }

        .chat-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Chat Log Display Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #3e3e44;
            border-radius: 3px;
        }

        /* Message Bubbles Base */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* User Message Style */
        .message.user {
            background-color: #007acc;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* AI Message Style */
        .message.bot {
            background-color: #2f2f33;
            color: #e2e2e6;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #3e3e44;
        }

        /* Input Box Footer Bar */
        .chat-input-area {
            background-color: #2d2d31;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #323236;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #1a1a1c;
            border: 1px solid #3e3e44;
            border-radius: 6px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #007acc;
        }

        .chat-input-area button {
            background-color: #007acc;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #0062a3;
        }

        .chat-input-area button:disabled {
            background-color: #4e4e54;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            <h2>Eternal AI System</h2>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot">Hello! I am Eternal AI. How can I help you today?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask Eternal AI anything..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // 🌐 REPLACE THIS WITH YOUR BACKEND WEB ADDRESS ONCE HOSTED
        // For local machine testing, you use 'http://localhost:8080/chat'
        const BACKEND_URL = 'http://YOUR_XENONHOST_IP_OR_DOMAIN:8080/chat'; 

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Allow hitting "Enter" key to send messages
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Display User Message on Screen
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Disable inputs while AI is thinking
            userInput.disabled = true;
            sendBtn.disabled = true;

            // 2. Display a temporary placeholder for the Bot loading
            const loadingDiv = appendMessage('Thinking...', 'bot');

            try {
                // 3. Make the API Web request to your server
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                // 4. Update the placeholder text with the actual Gemini response
                if (data.reply) {
                    loadingDiv.textContent = data.reply;
                } else if (data.error) {
                    loadingDiv.textContent = "Error: Unable to process prompt.";
                }
            } catch (error) {
                console.error('Connection Error:', error);
                loadingDiv.textContent = "Could not connect to Eternal AI network server.";
            }

            // Re-enable inputs
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            
            // Auto-scroll screen down to the newest message seamlessly
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
